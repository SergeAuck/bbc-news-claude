services:
  backend:
    build:
      context: ./backend/AusNews
    ports:
      - "5262:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - NewsApi__ApiKey=${NEWSAPI_KEY}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5262
    ports:
      - "5173:80"
    depends_on:
      - backend
